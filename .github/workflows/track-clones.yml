name: Track clone stats

on:
  schedule:
    - cron: "0 9 * * *"   # daily at 9 AM UTC
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch clone stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p stats
          DATE=$(date +%Y-%m-%d)
          RESPONSE=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/jessica-schofield/march-madness-bot/traffic/clones)
          echo "{\"snapshot_date\": \"$DATE\", \"data\": $RESPONSE}" >> stats/clones.jsonl

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/clones.jsonl
          git diff --cached --quiet || git commit -m "chore: daily clone snapshot $(date +%Y-%m-%d)"
          git push